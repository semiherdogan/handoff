name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build (macOS arm64)
    runs-on: macos-latest
    env:
      TARGET: aarch64-apple-darwin
      ASSET_NAME: handoff-aarch64-apple-darwin
      BINARY_NAME: handoff

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Write release version file
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ -z "$tag_version" ]]; then
            echo "Failed to read release tag version"
            exit 1
          fi
          printf '%s\n' "$tag_version" > version.txt

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked --target $TARGET

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/$TARGET/release/$BINARY_NAME" "dist/$ASSET_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ${{ env.ASSET_NAME }}
          path: dist/${{ env.ASSET_NAME }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: dist/*
