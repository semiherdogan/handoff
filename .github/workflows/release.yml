name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: handoff-x86_64-unknown-linux-gnu
            binary_name: handoff
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: handoff-aarch64-apple-darwin
            binary_name: handoff

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Write release version file
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ -z "$tag_version" ]]; then
            echo "Failed to read release tag version"
            exit 1
          fi
          printf '%s\n' "$tag_version" > version.txt

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: dist/*
